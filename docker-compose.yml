# Nutrition Coach API + PostgreSQL.
#
# 1. cp env.docker.example .env
# 2. Set POSTGRES_PASSWORD (and any LLM keys) in .env — do not commit .env
# 3. docker compose up --build
#
# The API `DATABASE_URL` is built from the same POSTGRES_* values as the `db` service.
# If your database password contains URL-reserved characters (@ : / # etc.),
# set DATABASE_URL in .env yourself and add `environment: DATABASE_URL: ${DATABASE_URL}` to `api` instead.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file (see env.docker.example)}
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_coach}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Same credentials as the `db` service (set in .env; never commit).
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nutrition_coach}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    volumes:
      - marketplace_uploads:/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  marketplace_uploads:
