# Render Blueprint: Web Service (Python) for the FastAPI API.
# https://render.com/docs/blueprint-spec
#
# Set environment variables in the Render dashboard, e.g.:
#   CORS_ORIGINS, GROQ_API_KEY, DATABASE_URL, SECRET_KEY
# Render provides PORT; Uvicorn should bind to $PORT (see startCommand).

services:
  - type: web
    name: nutrition-coach-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_entry:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
