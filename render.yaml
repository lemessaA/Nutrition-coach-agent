# Render Blueprint — FastAPI (Python) for Nutrition Coach
# https://render.com/docs/blueprint-spec
#
# Apply: Dashboard → New + → Blueprint → connect this repo. Set GROQ_API_KEY when asked.
# DATABASE_URL is set automatically from the Render Postgres below (internal connection).
#
# Build: pip bootstraps uv, then uv pip installs from repo-root requirements.txt
# (Render’s image has pip; project deps use uv pip).

databases:
  - name: nutrition-coach-db
    plan: free
    region: oregon
    # Optional: set databaseName / user; defaults are fine for a new app

services:
  - type: web
    name: nutrition-coach-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install uv && uv pip install --system -r requirements.txt
    startCommand: cd backend && uvicorn app_entry:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "https://nutrition-coach-agent-kappa.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nutrition-coach-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
